<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diggory — Analytics</title>
<link rel="icon" type="image/png" href="/diggory_favicon2.png" />
<link rel="apple-touch-icon" href="/DIGGORY_icon.png" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#141414" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Diggory" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0e8d8;font-family:'Courier New',monospace;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:16px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes ldots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
@keyframes spin{to{transform:rotate(360deg)}}
.ldots::after{content:'';animation:ldots 1.2s steps(1,end) infinite}
@keyframes pulse-fade{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes sweep{0%{transform:translateX(-300%)}100%{transform:translateX(600%)}}
.loading-pulse{animation:pulse-fade 1.4s ease-in-out infinite}
.header{background:#141414;border-bottom:2px solid #333;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative}
.hdr-logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:14px;pointer-events:none}
.hdr-logo svg{height:36px;width:auto}
.hdr-logo-sep{color:#333;font-size:20px;line-height:1;font-weight:200}
.clyde-logo-img{height:36px;width:auto}
.mob-logo{display:none}
.mob-logo-inner{display:flex;align-items:center;gap:12px}
.mob-logo svg{height:38px;width:auto}
.mob-clyde-logo{height:40px;width:auto}
.logo{display:flex;align-items:center;gap:12px;font-size:16px;font-weight:bold;letter-spacing:.12em}
.dot{width:9px;height:9px;border-radius:50%;background:#666}
.dot.live{background:#5dcc8a;box-shadow:0 0 8px #5dcc8a}
.dot.demo{background:#4a9eed;box-shadow:0 0 8px #4a9eed}
.badge{font-size:12px;padding:3px 10px;border-radius:2px;font-weight:bold;letter-spacing:.12em;border:1px solid #666;color:#999}
.badge.live{border-color:#5dcc8a;color:#5dcc8a;background:#0d2018}
.badge.demo{border-color:#4a9eed;color:#4a9eed;background:#0f1a2a}
.hdr-right{display:flex;gap:10px;align-items:center}
.btn{font-family:inherit;font-size:13px;padding:5px 12px;background:transparent;border:1px solid #444;color:#aaa;cursor:pointer;border-radius:3px}
.btn:hover{border-color:#c8922a;color:#c8922a}
.key-bar{background:#111;border-bottom:2px solid #333;padding:9px 22px;display:flex;gap:10px}
.key-bar input{flex:1;background:#1e1e1e;border:1px solid #444;color:#f0e8d8;padding:7px 12px;border-radius:3px;font-size:14px;font-family:inherit;outline:none}
.key-bar button{background:#c8922a;border:none;color:#000;padding:7px 16px;border-radius:3px;cursor:pointer;font-size:14px;font-weight:bold;font-family:inherit}
.body{display:flex;flex:1;overflow:hidden}
.left{width:25vw;min-width:340px;max-width:50vw;border-right:none;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.divider{width:5px;background:#333;cursor:col-resize;flex-shrink:0;position:relative;transition:background .15s}
.divider:hover,.divider.active{background:#c8922a}
.tabs{display:flex;background:#141414;border-bottom:2px solid #333}
.tab{flex:1;padding:10px 4px;font-size:13px;background:transparent;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.12em;color:#bbb;border-bottom:3px solid transparent;font-family:inherit}
.tab.on{color:#c8922a;border-bottom-color:#c8922a}
.panel{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#1a1a1a;border:1px solid #333;border-left:4px solid #c8922a;padding:13px 14px;border-radius:5px}
.card.g{border-left-color:#5dcc8a}.card.r{border-left-color:#e06060}
.clabel{font-size:12px;color:#bbb;text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px}
.cval{font-size:25px;font-weight:bold;color:#f0e8d8}
.csub{font-size:13px;color:#bbb;margin-top:4px}
.box{background:#1a1a1a;border:1px solid #333;padding:14px;border-radius:5px}
.redborder{border-color:#e06060 !important;border-width:2px !important}
.boxtitle{font-size:13px;color:#bbb;text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px}
.boxtitle.red{color:#e06060}
.row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:7px;gap:8px;color:#ddd}
.row span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.amber{color:#e0a830}.red{color:#e06060}.green{color:#5dcc8a}.muted{color:#888}
.bar-wrap{display:flex;align-items:flex-end;gap:3px;height:56px}
.bar-labels{display:flex;justify-content:space-between;margin-top:5px}
.prog-row{margin-bottom:9px}
.prog-hd{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px;color:#ddd}
.prog-track{height:4px;background:#2a2a2a;border-radius:2px}
.prog-fill{height:100%;background:#c8922a;border-radius:2px;opacity:.85}
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-hd{padding:10px 18px;border-bottom:2px solid #333;background:#141414;font-size:13px;color:#aaa;letter-spacing:.14em;text-transform:uppercase}
.quick-bar{display:flex;gap:7px;padding:9px 14px;overflow-x:auto;border-bottom:1px solid #333;flex-shrink:0}
.qbtn{flex-shrink:0;padding:6px 13px;background:transparent;border:1px solid #444;color:#aaa;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.qbtn:hover{border-color:#c8922a;color:#e0a830}
.messages{flex:1;overflow-y:auto;padding:14px 18px}
.msg{display:flex;margin-bottom:14px}
.msg.user{justify-content:flex-end}
.ai-icon{width:28px;height:28px;border-radius:50%;background:#6b4d15;display:flex;align-items:center;justify-content:center;font-size:12px;color:#e0a830;flex-shrink:0;margin-right:9px;margin-top:2px;font-weight:bold}
.bubble{max-width:84%;padding:11px 14px;border-radius:10px 10px 10px 2px;font-size:15px;line-height:1.7;white-space:pre-wrap;background:#1a1a1a;border:1px solid #333;color:#f0e8d8}
.bubble.user{border-radius:10px 10px 2px 10px;background:#1e1608;border-color:#6b4d15}
.cursor{color:#c8922a;animation:blink 1s step-end infinite}
.input-bar{padding:11px 14px;border-top:2px solid #333;display:flex;gap:10px;background:#141414;flex-shrink:0}
.input-bar textarea{flex:1;background:#0a0a0a;border:1px solid #444;color:#f0e8d8;padding:10px 13px;border-radius:4px;font-size:15px;resize:none;line-height:1.5;font-family:inherit;outline:none}
.input-bar textarea::placeholder{color:#666}
#loyalty-search::placeholder{color:#888}
.send-btn{background:#c8922a;border:none;color:#000;padding:10px 18px;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold;flex-shrink:0;font-family:inherit}
.send-btn:disabled{background:#5a3f10;color:#888;cursor:not-allowed}
.range-bar{background:#111;border-bottom:2px solid #333;padding:8px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.rp-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.rc-lbl{font-size:12px;color:#999;text-transform:uppercase;letter-spacing:.1em}
.rpbtn{font-family:inherit;font-size:12px;padding:3px 8px;background:transparent;border:1px solid #3a3a3a;color:#bbb;border-radius:3px;cursor:pointer;white-space:nowrap;letter-spacing:.08em;text-transform:uppercase}
.rpbtn:hover,.rpbtn.on{border-color:#c8922a;color:#c8922a;background:#1a1200}
.rc-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.rc-row input[type=date],.rc-row input[type=time]{background:#1e1e1e;border:1px solid #444;color:#f0e8d8;padding:3px 6px;border-radius:3px;font-family:inherit;font-size:13px;outline:none;color-scheme:dark}
.rc-row .go-btn{background:#c8922a;border:none;color:#000;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:13px;font-weight:bold;font-family:inherit}
.see-more-btn{font-family:inherit;font-size:12px;padding:2px 8px;background:transparent;border:1px solid #444;color:#888;border-radius:3px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.see-more-btn:hover{border-color:#c8922a;color:#c8922a}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#1a1a1a;border:1px solid #444;border-radius:6px;width:92%;max-width:560px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #2e2e2e;flex-shrink:0}
.modal-title{font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:.14em}
.modal-close{background:transparent;border:none;color:#666;font-size:23px;cursor:pointer;line-height:1;padding:0 2px}
.modal-close:hover{color:#f0e8d8}
.modal-body{overflow-y:auto;padding:10px 18px 18px}
.modal-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #222;font-size:14px;align-items:baseline}
.modal-row:last-child{border-bottom:none}
.modal-rank{color:#555;width:20px;flex-shrink:0;text-align:right}
.modal-name{flex:1;color:#f0e8d8;line-height:1.45;word-break:break-word}
.modal-units{color:#777;white-space:nowrap;font-size:13px}
.modal-rev{color:#e0a830;font-weight:bold;white-space:nowrap;min-width:60px;text-align:right}
.modal-inv-hd{display:grid;grid-template-columns:1fr 52px 52px 55px;gap:6px;font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.1em;padding:0 0 7px;border-bottom:1px solid #2e2e2e;margin-bottom:2px}
.modal-inv-row{display:grid;grid-template-columns:1fr 52px 52px 55px;gap:6px;padding:7px 0;border-bottom:1px solid #1e1e1e;font-size:14px;align-items:start}
.modal-inv-row:last-child{border-bottom:none}
.modal-inv-row:last-child{border-bottom:none}
.inv-name{color:#f0e8d8;line-height:1.4;word-break:break-word}
.inv-brand{font-size:12px;color:#666;margin-top:2px}
.inv-sku{color:#666;font-size:13px;word-break:break-all;padding-top:1px}
.inv-qty{font-weight:bold;text-align:right;padding-top:1px}
.inv-price{color:#aaa;text-align:right;padding-top:1px}
.cat-link{background:transparent;border:none;color:#f0e8d8;cursor:pointer;font-family:inherit;font-size:inherit;padding:0;text-align:left;text-decoration-line:underline;text-decoration-color:#444}
.cat-link:hover{color:#c8922a;text-decoration-color:#c8922a}
.chat-chart{background:#0f0f0f;border:1px solid #2a2a2a;border-radius:4px;padding:12px 12px 8px;margin-top:2px;width:100%}
.chat-chart-title{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.chat-chart-bars{display:flex;align-items:flex-end;gap:2px;height:64px}
.chat-bar-col{display:flex;flex-direction:column;justify-content:flex-end;flex:1;min-width:0;height:100%}
.chat-bar{width:100%;min-width:2px;background:linear-gradient(180deg,#c8922a,#6b4d15);border-radius:1px 1px 0 0}
.chat-chart-xlabels{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:#555}
.msg-chart{padding-left:37px;margin-bottom:14px}

/* ── Mobile nav (hidden on desktop) ───────────────────────────── */
.mobile-nav{display:none}

/* ── Responsive ───────────────────────────────────────────────── */
@media(max-width:767px){
  /* Header: compact & no-overflow */
  .header{padding:8px 12px;gap:6px}
  .logo{font-size:13px;gap:7px;min-width:0;flex:1}
  .logo>span:first-of-type{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #sync{display:none}
  .hdr-right{gap:6px;flex-shrink:0}
  .btn{font-size:12px;padding:4px 8px}
  #lowbadge{font-size:10px;padding:3px 6px}

  /* 617THC logo: hide from header, show above nav tabs */
  .hdr-logo{display:none}
  .mob-logo{display:flex;justify-content:center;align-items:center;background:#141414;border-bottom:1px solid #222;padding:8px 10px;flex-shrink:0;overflow:hidden}
  .mob-logo-inner{gap:8px;max-width:100%}
  .mob-logo svg{height:28px;width:auto;max-width:52vw;flex-shrink:1}
  .mob-clyde-logo{height:30px;width:auto;max-width:36vw;object-fit:contain;flex-shrink:1}

  /* Mobile view toggle nav */
  .mobile-nav{display:flex;background:#141414;border-bottom:2px solid #333;flex-shrink:0}
  .mnav-btn{flex:1;padding:11px 4px;font-size:13px;background:transparent;border:none;border-bottom:3px solid transparent;color:#bbb;cursor:pointer;text-transform:uppercase;letter-spacing:.12em;font-family:inherit}
  .mnav-btn.on{color:#c8922a;border-bottom-color:#c8922a}

  /* Layout: fill viewport, one panel at a time */
  .body{flex-direction:column}
  .left{width:100%!important;min-width:0;max-width:none;flex:1;min-height:0}
  .divider{display:none}
  .right{flex:1;min-height:0}
  .mob-hidden{display:none!important}

  /* Panel */
  .panel{padding:10px;gap:9px}
  .card{padding:11px 12px}
  .cval{font-size:23px}
  .grid2{grid-template-columns:1fr 1fr}

  /* Range bar */
  .range-bar{padding:6px 8px}
  .rpbtn{font-size:10px;padding:3px 6px}
  .rc-row input[type=date],.rc-row input[type=time]{font-size:12px;padding:2px 5px}

  /* Chat */
  .chat-hd{padding:8px 12px;font-size:12px}
  .quick-bar{padding:6px 10px;gap:5px}
  .qbtn{font-size:12px;padding:5px 10px}
  /* Extra bottom padding so last messages aren't hidden behind the fixed input bar */
  .messages{padding:10px 12px 68px}
  .bubble{max-width:94%;font-size:14px;padding:9px 11px}
  /* Pin input bar to the bottom of the visual viewport (above the keyboard) */
  .input-bar{
    position:fixed;bottom:0;left:0;right:0;
    padding:8px 10px;gap:8px;
    z-index:50;
  }
  .input-bar textarea{font-size:14px;padding:8px 10px}
  .msg-chart{padding-left:0}

  /* Modal */
  .modal-box{width:96%;max-height:90vh}
  .modal-inv-hd,.modal-inv-row{grid-template-columns:1fr 46px 46px 50px}
}
</style>
</head>

  </div>
  <div class="hdr-right">
    <span class="badge" style="border-color:#e06060;color:#e06060;background:#2a0f0f;display:none;cursor:pointer" id="lowbadge" onclick="openLowStockModal()"></span>
    <a href="/admin" id="adminBtn" title="Admin settings" style="display:none;text-decoration:none;background:none;border:1px solid #333;color:#666;border-radius:4px;padding:4px 8px;margin-left:6px;font-size:15px;line-height:1;cursor:pointer" aria-label="Admin">⚙</a>
    <a href="/logout" class="btn" style="text-decoration:none;font-size:10px;padding:4px 10px;border-color:#555;color:#777;margin-left:6px" title="Sign out">LOGOUT</a>
  </div>
</div>

<div class="body">
  <div class="left">
    <div class="tabs">
      <button class="tab on" id="t-sales" onclick="setTab('sales')">Sales</button>
      <button class="tab" id="t-inventory" onclick="setTab('inventory')">Inventory</button>
      <button class="tab" id="t-customers" onclick="setTab('customers')">Customers</button>
    </div>
    <div class="range-bar" id="rangeBar">
      <div class="rp-row">
        <span class="rc-lbl" style="margin-right:4px">Range:</span>
        <button class="rpbtn on" id="rp-default" onclick="setPreset('default')">All</button>
        <button class="rpbtn" id="rp-today" onclick="setPreset('today')">Today</button>
        <button class="rpbtn" id="rp-yesterday" onclick="setPreset('yesterday')">Yest</button>
        <button class="rpbtn" id="rp-week" onclick="setPreset('week')">7d</button>
        <button class="rpbtn" id="rp-month" onclick="setPreset('month')">30d</button>
        <button class="rpbtn" id="rp-custom" onclick="setPreset('custom')">Custom…</button>
      </div>
      <div class="rc-row" id="rcRow" style="display:none">
        <input type="date" id="rStart"><input type="time" id="rStartT" value="00:00"><span class="rc-lbl">EST</span>
        <span class="rc-lbl">→</span>
        <input type="date" id="rEnd"><input type="time" id="rEndT" value="23:59"><span class="rc-lbl">EST</span>
        <button class="go-btn" onclick="applyCustom()">GO</button>
      </div>
    </div>
    <div class="panel" id="panel">
      <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:20px;text-align:center;min-height:220px;border-left-color:#c8922a">
        <div style="width:40px;height:40px;border:3px solid #2a2a2a;border-top-color:#c8922a;border-radius:50%;animation:spin 0.85s linear infinite;flex-shrink:0"></div>
        <div>
          <div class="clabel loading-pulse" style="font-size:13px;letter-spacing:.18em">Fetching data<span class="ldots"></span></div>
          <div style="margin-top:12px;font-size:12px;color:#555;line-height:1.7">Initial load pulls up to 90 days of orders.<br>This may take up to <span style="color:#c8922a">30 seconds</span>.</div>
        </div>
        <div style="width:180px;height:3px;border-radius:2px;background:#1e1e1e;overflow:hidden;flex-shrink:0">
          <div style="width:35%;height:100%;background:linear-gradient(90deg,transparent,#c8922a,transparent);animation:sweep 1.5s ease-in-out infinite"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="right">
    <div class="chat-hd" style="display:flex;justify-content:space-between;align-items:center">
      <span>Ask anything about your store</span>
      <button onclick="copyChat()" id="copyChatBtn" style="background:none;border:1px solid #444;color:#666;font-size:11px;padding:3px 9px;border-radius:3px;cursor:pointer;font-family:inherit;letter-spacing:.08em;text-transform:uppercase" title="Copy full chat to clipboard">Copy</button>
    </div>
    <div class="quick-bar" id="quickBar"></div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea id="chatInput" rows="1" placeholder="Ask about your sales, inventory, customers..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendChat()">ASK</button>
    </div>
  </div>
</div>

      <button class="modal-close" onclick="document.getElementById('topModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<div class="modal-overlay" id="loyaltyModal" onclick="if(event.target===this)this.classList.remove('open')">

      <button class="modal-close" onclick="document.getElementById('loyaltyModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body" id="loyaltyModalBody"></div>
  </div>
</div>
<script type="module" src="js/app.js"></script>
<script>
// Draggable panel divider — persists width to localStorage
(function() {
  var div = document.getElementById('divider');
  var left = document.querySelector('.left');
  if (!div || !left) return;
  // Restore saved width
  var saved = localStorage.getItem('panelWidth');
  if (saved) left.style.width = saved + 'px';

  var dragging = false;
  div.addEventListener('mousedown', function(e) {
    e.preventDefault();
    dragging = true;
    div.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var w = Math.max(340, Math.min(window.innerWidth * 0.5, e.clientX));
    left.style.width = w + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    div.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem('panelWidth', parseInt(left.style.width));
  });
})();
</script>
